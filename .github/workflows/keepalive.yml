name: Keep database awake

# Supabase's free tier pauses a project after 7 days with no database
# activity (data isn't lost, just paused — but every request stalls ~30s
# until it's manually or automatically resumed). Every 3 days is a wide
# enough margin that a missed run or two still won't let 7 days elapse.
on:
  schedule:
    - cron: "0 12 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the deployed backend's db-ping endpoint
        run: curl -sf --retry 3 --retry-delay 20 --max-time 120 https://payments-observability-api.onrender.com/api/db-ping
